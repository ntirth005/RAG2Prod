<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG2Prod — Agentic RAG Platform</title>
  <meta name="description" content="RAG2Prod: Production-grade Agentic RAG system with multi-provider LLM generation, vector search, and cited answers.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent-primary: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --accent-cyan: #06b6d4;
      --accent-emerald: #10b981;
      --accent-amber: #f59e0b;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --input-bg: rgba(31, 41, 55, 0.6);
      --source-highlight: rgba(251, 191, 36, 0.15);
      --source-border: rgba(251, 191, 36, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      background-image:
        radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(6, 182, 212, 0.12) 0%, transparent 40%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--card-border);
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-group { display: flex; align-items: center; gap: 0.75rem; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-family: 'Outfit', sans-serif; font-size: 1.1rem;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .brand-title { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .badge-stage {
      background: rgba(16, 185, 129, 0.15); color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.3);
      padding: 0.25rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600;
    }
    .header-actions { display: flex; gap: 1rem; align-items: center; }
    .btn-api-docs {
      background: rgba(255, 255, 255, 0.05); color: var(--text-main);
      border: 1px solid var(--card-border); padding: 0.5rem 1rem; border-radius: 8px;
      text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: all 0.2s;
    }
    .btn-api-docs:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }

    /* ── Layout ── */
    .content-wrapper {
      max-width: 1400px; width: 100%; margin: 2rem auto; padding: 0 1.5rem;
      display: flex; flex-direction: column; gap: 1.75rem; flex: 1;
    }
    .bottom-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.75rem;
    }
    @media (max-width: 960px) { .bottom-grid { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.75rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .card-title {
      font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem; color: #f3f4f6;
    }

    /* ── Form Elements ── */
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.825rem; font-weight: 500; color: var(--text-muted); }
    input[type="text"], textarea, select {
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 0.65rem 0.85rem; color: var(--text-main);
      font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent-primary); }

    .file-dropzone {
      border: 2px dashed rgba(99, 102, 241, 0.4);
      background: rgba(99, 102, 241, 0.04);
      border-radius: 12px; padding: 1.5rem; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .file-dropzone:hover { background: rgba(99, 102, 241, 0.08); border-color: var(--accent-primary); }

    .btn-action {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
      color: white; border: none; border-radius: 8px; padding: 0.75rem 1.25rem;
      font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    .btn-action:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-action:active { transform: translateY(0); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Q&A Panel ── */
    .qa-input-row {
      display: flex; gap: 0.75rem; align-items: stretch;
    }
    .qa-input-row input[type="text"] {
      flex: 1; font-size: 1rem; padding: 0.85rem 1rem;
      border-radius: 12px;
    }
    .qa-controls {
      display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
    }
    .provider-select {
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 0.5rem 0.75rem; color: var(--text-main);
      font-family: inherit; font-size: 0.85rem; outline: none;
    }

    /* ── Answer Area ── */
    .answer-container {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1.5rem;
      min-height: 120px;
      position: relative;
    }
    .answer-text {
      font-size: 0.95rem; line-height: 1.7; color: #e5e7eb;
      white-space: pre-wrap;
    }
    .answer-text .source-ref {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .answer-text .source-ref:hover {
      background: rgba(99, 102, 241, 0.4);
    }
    .typing-cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--accent-cyan);
      animation: blink 0.7s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

    .answer-meta {
      display: flex; gap: 1.5rem; margin-top: 1rem; padding-top: 0.75rem;
      border-top: 1px solid var(--card-border); flex-wrap: wrap;
    }
    .meta-pill {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.75rem; color: var(--text-muted);
      background: rgba(255, 255, 255, 0.04);
      padding: 0.3rem 0.6rem; border-radius: 6px;
    }
    .meta-pill .value { color: var(--accent-cyan); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

    /* ── Source Cards ── */
    .sources-section {
      margin-top: 1rem;
    }
    .sources-toggle {
      background: rgba(251, 191, 36, 0.1); border: 1px solid var(--source-border);
      color: var(--accent-amber); border-radius: 8px; padding: 0.5rem 1rem;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .sources-toggle:hover { background: rgba(251, 191, 36, 0.2); }
    .sources-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.75rem; margin-top: 0.75rem;
    }
    .source-card {
      background: var(--source-highlight);
      border: 1px solid var(--source-border);
      border-radius: 10px; padding: 1rem;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .source-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(251, 191, 36, 0.15);
    }
    .source-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.5rem;
    }
    .source-index {
      background: rgba(251, 191, 36, 0.3); color: #fbbf24;
      font-weight: 700; font-size: 0.75rem;
      padding: 0.2rem 0.5rem; border-radius: 6px;
    }
    .source-score {
      background: rgba(16, 185, 129, 0.2); color: #34d399;
      font-weight: 700; font-size: 0.75rem;
      padding: 0.2rem 0.5rem; border-radius: 6px;
    }
    .source-snippet {
      font-size: 0.8rem; color: #d1d5db; line-height: 1.5;
      background: rgba(0, 0, 0, 0.2); border-radius: 6px; padding: 0.75rem;
      margin-top: 0.5rem; max-height: 120px; overflow-y: auto;
      border-left: 3px solid var(--accent-amber);
    }
    .source-meta {
      display: flex; gap: 0.75rem; margin-top: 0.5rem; font-size: 0.7rem; color: var(--text-muted);
    }

    /* ── Results (existing ingestion/retrieval) ── */
    .result-box {
      background: rgba(0, 0, 0, 0.25); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 1rem; font-family: 'JetBrains Mono', monospace;
      font-size: 0.825rem; overflow-x: auto; max-height: 250px;
    }
    .chunk-card {
      background: rgba(31, 41, 55, 0.4); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .chunk-header { display: flex; justify-content: space-between; align-items: center; }
    .score-badge {
      background: rgba(16, 185, 129, 0.2); color: #34d399; font-weight: 700;
      font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 6px;
      border: 1px solid rgba(52, 211, 153, 0.3);
    }
    .parent-accordion {
      background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px; padding: 0.6rem; font-size: 0.8rem; color: var(--text-muted);
      margin-top: 0.4rem;
    }

    /* ── Placeholder / Empty State ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; color: var(--text-muted); text-align: center; gap: 0.5rem;
    }
    .empty-state-icon { font-size: 2rem; opacity: 0.5; }
  </style>
</head>
<body>

  <header>
    <div class="logo-group">
      <div class="logo-icon">R</div>
      <div class="brand-title">RAG2Prod Engine</div>
      <span class="badge-stage">Milestone 2 • Stage 4 & 5 Active</span>
    </div>
    <div class="header-actions">
      <a href="/docs" target="_blank" class="btn-api-docs">Interactive API Docs ⚡</a>
    </div>
  </header>

  <div class="content-wrapper">
    <!-- ═══════════ Q&A Panel (Full Width) ═══════════ -->
    <section class="card" id="qaPanel">
      <div class="card-title">
        <span>🤖 Ask RAG2Prod</span>
      </div>

      <div class="qa-input-row">
        <input type="text" id="qaQueryInput" placeholder="Ask a question about your ingested documents..."
               onkeydown="if(event.key==='Enter') submitQuery()">
        <button class="btn-action" id="qaSubmitBtn" onclick="submitQuery()">Ask</button>
      </div>

      <div class="qa-controls">
        <div class="form-group" style="flex-direction: row; gap: 0.5rem; align-items: center;">
          <label style="margin: 0;">Provider:</label>
          <select class="provider-select" id="qaProvider">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">OpenAI</option>
          </select>
        </div>
        <div class="form-group" style="flex-direction: row; gap: 0.5rem; align-items: center;">
          <label style="margin: 0;">Top K:</label>
          <input type="range" id="qaTopK" min="1" max="20" value="5" style="width: 80px;"
                 oninput="document.getElementById('qaTopKVal').innerText = this.value">
          <span id="qaTopKVal" style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--accent-cyan);">5</span>
        </div>
        <div class="form-group" style="flex-direction: row; gap: 0.5rem; align-items: center;">
          <label style="margin: 0; white-space: nowrap;">Streaming:</label>
          <label style="position: relative; display: inline-block; width: 40px; height: 22px; margin: 0;">
            <input type="checkbox" id="qaStreamToggle" checked style="opacity: 0; width: 0; height: 0;">
            <span style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
                         background: rgba(255,255,255,0.1); border-radius: 22px; transition: 0.3s;"
                  onclick="this.previousElementSibling.checked = !this.previousElementSibling.checked; this.style.background = this.previousElementSibling.checked ? 'var(--accent-primary)' : 'rgba(255,255,255,0.1)';"
                  id="qaStreamSlider"></span>
          </label>
        </div>
      </div>

      <!-- Answer Area -->
      <div class="answer-container" id="answerContainer" style="display: none;">
        <div class="answer-text" id="answerText"></div>
        <div class="answer-meta" id="answerMeta" style="display: none;"></div>
      </div>

      <!-- Sources Section -->
      <div class="sources-section" id="sourcesSection" style="display: none;">
        <button class="sources-toggle" onclick="toggleSources()">
          <span>📚</span>
          <span id="sourcesToggleText">Show Sources</span>
          <span id="sourcesCount"></span>
        </button>
        <div class="sources-grid" id="sourcesGrid" style="display: none;"></div>
      </div>
    </section>

    <!-- ═══════════ Ingestion & Retrieval (2-column grid) ═══════════ -->
    <div class="bottom-grid">
      <!-- Ingestion Panel -->
      <section class="card">
        <div class="card-title">
          <span>📄 Knowledge Ingestion Workspace</span>
        </div>
        <div class="form-group">
          <label>Upload Document (PDF, TXT, MD, HTML, Python, Code)</label>
          <div class="file-dropzone" onclick="document.getElementById('fileInput').click()">
            <p id="fileNameDisplay">Click or drag document here to upload</p>
            <input type="file" id="fileInput" style="display:none" onchange="updateFileName()">
          </div>
        </div>
        <div class="form-group">
          <label>Custom Document ID (Optional)</label>
          <input type="text" id="docIdInput" placeholder="e.g. doc_report_2026">
        </div>
        <div class="form-group">
          <label>Source Metadata JSON (Optional)</label>
          <input type="text" id="metadataInput" placeholder='{"author": "Engineering", "category": "specs"}'>
        </div>
        <button class="btn-action" onclick="submitIngest()">Ingest & Vectorize Document</button>
        <div class="form-group" id="ingestResultGroup" style="display:none;">
          <label>Ingestion Response</label>
          <div class="result-box" id="ingestResultBox"></div>
        </div>
      </section>

      <!-- Vector Retrieval Panel -->
      <section class="card">
        <div class="card-title">
          <span>🔍 Dense Vector Search & Retrieval Engine</span>
        </div>
        <div class="form-group">
          <label>Search Query</label>
          <input type="text" id="queryInput" placeholder="Enter natural language query...">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label>Top K Chunks (<span id="topKVal">5</span>)</label>
            <input type="range" id="topKInput" min="1" max="20" value="5"
                   oninput="document.getElementById('topKVal').innerText = this.value">
          </div>
          <div class="form-group">
            <label>Score Threshold (<span id="scoreVal">0.00</span>)</label>
            <input type="range" id="scoreInput" min="0" max="1" step="0.05" value="0.00"
                   oninput="document.getElementById('scoreVal').innerText = parseFloat(this.value).toFixed(2)">
          </div>
        </div>
        <div class="form-group">
          <label>Filter Document ID (Optional)</label>
          <input type="text" id="filterDocId" placeholder="e.g. doc_report_2026">
        </div>
        <button class="btn-action" onclick="submitSearch()">Execute Cosine Vector Search</button>
        <div id="searchResults" style="margin-top: 0.5rem; overflow-y: auto; max-height: 400px;">
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <p>Execute a query to retrieve matching chunks.</p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // ── State ──
    let sourcesVisible = false;
    let currentCitations = [];

    // ── Initialize stream toggle visual ──
    document.addEventListener('DOMContentLoaded', () => {
      const slider = document.getElementById('qaStreamSlider');
      const toggle = document.getElementById('qaStreamToggle');
      if (toggle.checked) slider.style.background = 'var(--accent-primary)';
    });

    // ── Q&A Panel ──
    async function submitQuery() {
      const queryText = document.getElementById('qaQueryInput').value.trim();
      if (!queryText) return;

      const provider = document.getElementById('qaProvider').value;
      const topK = parseInt(document.getElementById('qaTopK').value);
      const useStream = document.getElementById('qaStreamToggle').checked;
      const btn = document.getElementById('qaSubmitBtn');

      btn.disabled = true;
      btn.textContent = 'Thinking...';

      const container = document.getElementById('answerContainer');
      const answerEl = document.getElementById('answerText');
      const metaEl = document.getElementById('answerMeta');
      const sourcesSection = document.getElementById('sourcesSection');

      container.style.display = 'block';
      answerEl.innerHTML = '<span class="typing-cursor"></span>';
      metaEl.style.display = 'none';
      sourcesSection.style.display = 'none';
      sourcesVisible = false;
      currentCitations = [];

      const payload = {
        query_text: queryText,
        top_k: topK,
        score_threshold: 0.0,
        stream: useStream,
        provider: provider,
      };

      if (useStream) {
        await streamQuery(payload, answerEl, metaEl, sourcesSection);
      } else {
        await nonStreamQuery(payload, answerEl, metaEl, sourcesSection);
      }

      btn.disabled = false;
      btn.textContent = 'Ask';
    }

    async function nonStreamQuery(payload, answerEl, metaEl, sourcesSection) {
      try {
        const resp = await fetch('/api/v1/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();

        answerEl.innerHTML = formatAnswer(data.answer);
        currentCitations = data.citations || [];
        renderMeta(metaEl, data);
        renderSources(sourcesSection, currentCitations);
      } catch (err) {
        answerEl.innerHTML = `<span style="color: #ef4444;">Error: ${err}</span>`;
      }
    }

    async function streamQuery(payload, answerEl, metaEl, sourcesSection) {
      try {
        const resp = await fetch('/api/v1/query/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let fullAnswer = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload_str = line.slice(6).trim();
            if (payload_str === '[DONE]') continue;

            try {
              const event = JSON.parse(payload_str);

              if (event.type === 'token') {
                fullAnswer += event.content;
                answerEl.innerHTML = formatAnswer(fullAnswer) + '<span class="typing-cursor"></span>';
                answerEl.parentElement.scrollTop = answerEl.parentElement.scrollHeight;
              } else if (event.type === 'citations') {
                currentCitations = event.citations || [];
                answerEl.innerHTML = formatAnswer(fullAnswer);
                renderMeta(metaEl, {
                  model_used: event.model,
                  latency_ms: event.latency_ms,
                  citations: currentCitations,
                });
                renderSources(sourcesSection, currentCitations);
              } else if (event.type === 'error') {
                answerEl.innerHTML += `<br><span style="color: #ef4444;">Error: ${event.message}</span>`;
              }
            } catch (e) {
              // skip malformed events
            }
          }
        }

        // Remove cursor after stream completes
        const cursor = answerEl.querySelector('.typing-cursor');
        if (cursor) cursor.remove();
      } catch (err) {
        answerEl.innerHTML = `<span style="color: #ef4444;">Stream error: ${err}</span>`;
      }
    }

    function formatAnswer(text) {
      // Escape HTML
      let safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // Highlight [Source N] references as clickable badges
      safe = safe.replace(/\[Source (\d+)\]/g, '<span class="source-ref" onclick="scrollToSource($1)">[Source $1]</span>');
      // Basic markdown-like formatting
      safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      safe = safe.replace(/\n/g, '<br>');
      return safe;
    }

    function renderMeta(metaEl, data) {
      metaEl.style.display = 'flex';
      metaEl.innerHTML = `
        ${data.model_used ? `<div class="meta-pill">🧠 Model: <span class="value">${data.model_used}</span></div>` : ''}
        ${data.latency_ms ? `<div class="meta-pill">⚡ Latency: <span class="value">${data.latency_ms}ms</span></div>` : ''}
        ${data.token_usage ? `<div class="meta-pill">📊 Tokens: <span class="value">${data.token_usage.total_tokens}</span></div>` : ''}
        ${data.retrieval_count !== undefined ? `<div class="meta-pill">📄 Sources: <span class="value">${data.citations ? data.citations.length : 0}</span></div>` : ''}
      `;
    }

    function renderSources(sourcesSection, citations) {
      if (!citations || citations.length === 0) return;

      sourcesSection.style.display = 'block';
      document.getElementById('sourcesCount').textContent = `(${citations.length})`;

      const grid = document.getElementById('sourcesGrid');
      grid.innerHTML = citations.map(c => `
        <div class="source-card" id="source-card-${c.index}">
          <div class="source-card-header">
            <span class="source-index">[Source ${c.index}]</span>
            <span class="source-score">${(c.similarity_score * 100).toFixed(1)}% match</span>
          </div>
          <div class="source-snippet">${escapeHtml(c.text_snippet)}</div>
          <div class="source-meta">
            <span>📄 Doc: ${c.document_id.substring(0, 20)}${c.document_id.length > 20 ? '...' : ''}</span>
            ${c.page_number !== null ? `<span>📃 Page ${c.page_number}</span>` : ''}
            <span>🔑 Chunk: ${c.chunk_id.substring(0, 8)}...</span>
          </div>
        </div>
      `).join('');
    }

    function toggleSources() {
      sourcesVisible = !sourcesVisible;
      document.getElementById('sourcesGrid').style.display = sourcesVisible ? 'grid' : 'none';
      document.getElementById('sourcesToggleText').textContent = sourcesVisible ? 'Hide Sources' : 'Show Sources';
    }

    function scrollToSource(index) {
      // Open sources if hidden
      if (!sourcesVisible) toggleSources();
      const card = document.getElementById(`source-card-${index}`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.boxShadow = '0 0 20px rgba(251, 191, 36, 0.5)';
        setTimeout(() => { card.style.boxShadow = ''; }, 2000);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── Ingestion Panel ──
    function updateFileName() {
      const input = document.getElementById('fileInput');
      if (input.files.length > 0) {
        document.getElementById('fileNameDisplay').innerText = `Selected: ${input.files[0].name}`;
      }
    }

    async function submitIngest() {
      const fileInput = document.getElementById('fileInput');
      if (fileInput.files.length === 0) { alert("Please select a file to ingest."); return; }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      const docId = document.getElementById('docIdInput').value.trim();
      if (docId) formData.append("doc_id", docId);
      const metadata = document.getElementById('metadataInput').value.trim();
      if (metadata) formData.append("metadata_json", metadata);

      const resBox = document.getElementById('ingestResultBox');
      document.getElementById('ingestResultGroup').style.display = "block";
      resBox.innerText = "Ingesting, chunking, and generating vector embeddings...";

      try {
        const resp = await fetch("/api/v1/documents/ingest", { method: "POST", body: formData });
        const data = await resp.json();
        resBox.innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        resBox.innerText = "Error ingesting file: " + err;
      }
    }

    // ── Vector Search Panel ──
    async function submitSearch() {
      const queryText = document.getElementById('queryInput').value.trim();
      if (!queryText) { alert("Please enter a search query."); return; }

      const topK = parseInt(document.getElementById('topKInput').value);
      const threshold = parseFloat(document.getElementById('scoreInput').value);
      const filterDocId = document.getElementById('filterDocId').value.trim();

      const payload = {
        query_text: queryText,
        top_k: topK,
        score_threshold: threshold,
        filter: filterDocId ? { document_id: filterDocId } : null
      };

      const resContainer = document.getElementById('searchResults');
      resContainer.innerHTML = "<p style='color: var(--text-muted); text-align: center;'>Searching vector embeddings...</p>";

      try {
        const resp = await fetch("/api/v1/retrieval/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();

        if (data.items && data.items.length > 0) {
          resContainer.innerHTML = data.items.map((item, idx) => `
            <div class="chunk-card">
              <div class="chunk-header">
                <span style="font-size: 0.8rem; font-weight: 600; color: #a5b4fc;">#${idx+1} Chunk: ${item.chunk_id.substring(0, 8)}...</span>
                <span class="score-badge">${(item.similarity_score * 100).toFixed(1)}% Match</span>
              </div>
              <p style="font-size: 0.875rem; color: #e5e7eb;">${escapeHtml(item.chunk_text)}</p>
              <div class="parent-accordion">
                <strong>Parent Context (${item.parent_id.substring(0, 8)}...):</strong><br>
                <span>${escapeHtml(item.parent_text)}</span>
              </div>
            </div>
          `).join('');
        } else {
          resContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No matching chunks found.</p></div>';
        }
      } catch (err) {
        resContainer.innerHTML = `<p style='color: #ef4444;'>Search failed: ${err}</p>`;
      }
    }
  </script>
</body>
</html>
