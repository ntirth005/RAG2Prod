version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag2prod_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag2prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag2prod"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
